<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport", content="width=device-width, inital-scale=1">
        <link rel="stylesheet" href="../style.css">
        <script>
            function toggle() {
              var x = document.getElementById("smol-navbar");
              if (x.style.display === "flex") {
                x.style.display = "none";
              } else {
                x.style.display = "flex";
              }
            }
        </script>
        <title>Spotify Authentication Confirmation</title>
    </head>
    <body>
        
        <div class="center">
            <h1>Spotify Authentication Confirmation</h1>
            <h2>You can close this window now</h2>
            <p>If you would like remove API access from this app:</p>
            <a href="https://www.spotify.com/us/account/apps/" class="button">Remove access</a>
        </div>
            
    </body>
</html>
